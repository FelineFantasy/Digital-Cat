name: 🐱 Digital Cat CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  syntax-check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4
    - name: Устанавливаем Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Проверяем, что Python-файл валидный
      shell: bash
      run: |
        python -m py_compile Digital_Cat.py && echo "OK: синтаксис корректен"

  build-exe:
    needs: syntax-check
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Устанавливаем PyInstaller
      run: pip install pyinstaller
      
    - name: Собираем бинарник
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          pyinstaller --onefile --name "Digital_Cat_${{ matrix.os }}.exe" Digital_Cat.py
        else
          pyinstaller --onefile --name "Digital_Cat_${{ matrix.os }}" Digital_Cat.py
        fi
      
    - name: Загружаем результат в Релиз
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly
        files: dist/Digital_Cat_${{ matrix.os }}*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
