name: 🐱 Digital Cat CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  syntax-check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4
    - name: Устанавливаем Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Проверяем, что Python-файл валидный
      shell: bash
      run: |
        python -m py_compile Digital-Cat.py && echo "OK: синтаксис корректен"

  build-exe:
    needs: syntax-check
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Устанавливаем зависимости
      run: |
        pip install nuitka
    
    - name: Собираем бинарник с Nuitka
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          python -m nuitka --standalone --onefile --windows-icon-from-ico=assets/cat.ico --output-dir=dist --output-filename=Digital-Cat_Windows.exe Digital-Cat.py
          echo "ASSET_NAME=Digital-Cat_Windows.exe" >> $GITHUB_ENV
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          python -m nuitka --standalone --onefile --macos-app-icon=assets/cat.icns --output-dir=dist --output-filename=Digital-Cat_macOS Digital-Cat.py
          echo "ASSET_NAME=Digital-Cat_macOS" >> $GITHUB_ENV
        else
          python -m nuitka --standalone --onefile --output-dir=dist --output-filename=Digital-Cat_Linux Digital-Cat.py
          echo "ASSET_NAME=Digital-Cat_Linux" >> $GITHUB_ENV
        fi

    - name: Подготовить бинарник к релизу
      shell: bash
      run: |
        mkdir -p release_assets
        if [ -f "dist/Digital-Cat_Windows.exe" ]; then
          cp dist/Digital-Cat_Windows.exe release_assets/ 2>/dev/null || true
        fi
        if [ -f "dist/Digital-Cat_macOS" ]; then
          cp dist/Digital-Cat_macOS release_assets/ 2>/dev/null || true
        fi
        if [ -f "dist/Digital-Cat_Linux" ]; then
          cp dist/Digital-Cat_Linux release_assets/ 2>/dev/null || true
        fi
        find dist -name "Digital-Cat_*" -exec cp {} release_assets/ \; 2>/dev/null || true

    - name: Пересоздать тег main
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -d main || true
        git push origin :refs/tags/main || true
        git tag main
        git push origin refs/tags/main --force

    - name: Загружаем результат в Релиз
      uses: softprops/action-gh-release@v2
      with:
        tag_name: main
        files: release_assets/*
        name: "Digital Cat (main)"
        body: "Самые свежие бинарники. Тег main пересоздаётся при каждом пуше."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
