name: 🐱 Digital Cat CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]*'
  pull_request:
    branches: [ "main" ]

jobs:
  syntax-check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4
    - name: Устанавливаем Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Проверяем, что Python-файл валидный
      shell: bash
      run: |
        python -m py_compile Digital-Cat.py && echo "OK: синтаксис корректен"

  build-exe:
    needs: syntax-check
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Устанавливаем зависимости (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y patchelf
        pip install nuitka

    - name: Устанавливаем зависимости (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install file
        pip install nuitka

    - name: Устанавливаем PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pip install pyinstaller

    - name: Собираем бинарник (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile --icon=assets/cat.ico --name "Digital-Cat_Windows" Digital-Cat.py
        echo "ASSET_NAME=Digital-Cat_Windows.exe" >> $GITHUB_ENV

    - name: Устанавливаем file (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install file
        echo "FILE_PATH=$(which file)" >> $GITHUB_ENV

    - name: Проверяем file (macOS)
      if: runner.os == 'macOS'
      run: |
        which file
        file --version

    - name: Собираем бинарник с Nuitka (macOS)
      if: runner.os == 'macOS'
      run: |
        python -m nuitka --standalone --onefile --macos-app-icon=assets/cat.icns --macos-target-arch=arm64 --output-dir=dist --output-filename=Digital-Cat_macOS Digital-Cat.py
        echo "ASSET_NAME=Digital-Cat_macOS" >> $GITHUB_ENV

    - name: Собираем бинарник с Nuitka (Linux)
      if: runner.os == 'Linux'
      run: |
        python -m nuitka --standalone --onefile --output-dir=dist --output-filename=Digital-Cat_Linux Digital-Cat.py
        echo "ASSET_NAME=Digital-Cat_Linux" >> $GITHUB_ENV

    - name: Подготовить бинарник к релизу
      shell: bash
      run: |
        mkdir -p release_assets
        cp dist/* release_assets/ || true

    - name: Пересоздать тег main
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -d main || true
        git push origin :refs/tags/main || true
        sleep 3
        git tag main
        git push origin refs/tags/main --force

    - name: Загружаем результат в Релиз
      uses: softprops/action-gh-release@v2
      with:
        tag_name: main
        files: release_assets/*
        name: "main"
        body: "The latest automated binaries. The main tag is recreated on every push."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
